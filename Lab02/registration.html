<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration - Maha Naveed</title>
</head>
<body>

  <h1>Student Registration Form</h1>

  <form>

    <label>First Name:</label><br>
    <input type="text" name="firstname" placeholder="Enter your first name"><br><br>

    <label>Last Name:</label><br>
    <input type="text" name="lastname" placeholder="Enter your last name"><br><br>

    <label>Registration Number:</label><br>
    <input type="text" name="regno" placeholder="e.g. 24PWBCS1183"><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" placeholder="yourname@uetpeshawar.edu.pk"><br><br>

    <label>Password:</label><br>
    <input type="password" name="password" placeholder="Enter password"><br><br>

    <label>Select Course:</label><br>
    <select name="course">
      <option value="">-- Choose a course --</option>
      <option value="cs201">CS 201 — OOP</option>
      <option value="cs224l">CS 224L — Web Technologies</option>
      <option value="cs231">CS 231 — DSA</option>
      <option value="ee211">EE 211 — Circuits</option>
      <option value="math221">MATH 221 — Calculus</option>
    </select><br><br>

    <label>Semester:</label><br>
    <input type="radio" name="semester" value="1"> 1st
    <input type="radio" name="semester" value="2">
