<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Basics</title>

    <style>
        body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #3498db; /* Blue background */
    font-family: Arial, sans-serif;
}

        .card {
            background: white;
            padding: 40px;
            width: 600px;
            display: flex;
            align-items: center;
            gap: 30px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.2);
        }

        .rounded-image {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #e24abe, #aa1c7f);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgb(25, 14, 14);
            font-size: 48px;
            font-weight: bold;
        }

        h1 {
            margin: 0;
            font-size: 28px;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="rounded-image">
            MN
        </div>

        <h1>Welcome to CS 311 - Web Programming</h1>
    </div>

</body>
</html>
